<body>
  <div id="__bundler_thumbnail"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#f6f8fa"></rect><rect x="15" y="15" width="70" height="70" rx="8" fill="#ffffff" stroke="#d1d9e0" stroke-width="2"></rect><rect x="15" y="15" width="70" height="16" rx="8" fill="#0969da"></rect><rect x="26" y="42" width="12" height="12" rx="3" fill="#2da44e"></rect><rect x="44" y="42" width="12" height="12" rx="3" fill="#cf222e"></rect><rect x="62" y="42" width="12" height="12" rx="3" fill="#d1d9e0"></rect><rect x="26" y="60" width="12" height="12" rx="3" fill="#d1d9e0"></rect><rect x="44" y="60" width="12" height="12" rx="3" fill="#2da44e"></rect><rect x="62" y="60" width="12" height="12" rx="3" fill="#cf222e"></rect></svg></div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ound:var(--danger-emphasis)}\n.dot.auto{background:var(--danger-subtle);border:1px dashed var(--danger-emphasis)}\n.month{margin-bottom:24px}\n.month-title{font-size:15px;font-weight:600;margin:0 0 10px;padding-left:2px}\n.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border-default);border:1px solid var(--border-default);border-radius:8px;overflow:hidden}\n.wd{text-align:center;font-size:12px;color:var(--fg-muted);font-weight:600;padding:6px 0;background:var(--canvas-subtle)}\n.cell{aspect-ratio:1;min-width:0;padding:5px 1px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:3px;background:var(--canvas-default)}\n.cell.empty{background:var(--canvas-subtle)}\n.cell.plain{color:var(--fg-subtle);font-size:13px;background:var(--canvas-subtle)}\n.cell.study{cursor:pointer;font-size:13px;font-weight:600;transition:background .12s,box-shadow .12s;position:relative;-webkit-tap-highlight-color:transparent}\n.cell.study:active{background:#eef4fd}\n.cell.study.selected{box-shadow:inset 0 0 0 2px var(--accent-emphasis)}\n.cell.study.fined{background:var(--danger-subtle)}\n.daynum{font-size:13px;font-weight:600;line-height:1}\n.cell.plain .daynum{font-weight:400}\n.sat{color:#0969da}\n.sun{color:#d1242f}\n.holi-name{font-size:9px;color:#d1242f;font-weight:600;text-align:center;line-height:1.1;margin-top:1px;padding:0 2px;overflow:hidden;text-overflow:ellipsis;max-width:100%;white-space:nowrap}\n.cap{font-size:12px;color:var(--fg-muted);margin:10px 2px 0}\n.cell-badges{display:flex;gap:1px}\n.badge{width:12px;height:12px;border-radius:3px;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}\n.badge.none{background:var(--canvas-subtle);border:1px solid var(--border-default);color:var(--fg-subtle)}\n.badge.present{background:var(--success-emphasis);color:#fff}\n.badge.absent{background:var(--danger-emphasis);color:#fff}\n.badge.auto{background:var(--danger-subtle);color:var(--danger-fg);border:1px dashed var(--danger-emphasis)}\n.panel-backdrop{position:fixed;inset:0;background:rgba(31,35,40,0.35);opacity:0;pointer-events:none;transition:opacity .18s;z-index:9}\n.panel-backdrop.show{opacity:1;pointer-events:auto}\n.panel{position:fixed;left:0;right:0;bottom:0;background:var(--canvas-default);border-top:1px solid var(--border-default);border-radius:18px 18px 0 0;box-shadow:0 -8px 24px rgba(31,35,40,0.14);transform:translateY(100%);transition:transform .22s ease;z-index:10;max-width:480px;margin:0 auto}\n.panel.show{transform:translateY(0)}\n.panel-inner{padding:18px 20px calc(26px + env(safe-area-inset-bottom))}\n.panel-grab{width:36px;height:4px;border-radius:2px;background:var(--border-default);margin:0 auto 14px}\n.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}\n.panel-title{font-size:17px;font-weight:600}\n.panel-close{background:none;border:none;font-size:20px;color:var(--fg-muted);cursor:pointer;line-height:1;padding:4px}\n.panel-close:hover{color:var(--fg-default)}\n.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}\n.pill{display:flex;align-items:center;gap:6px;padding:11px 16px;border-radius:22px;border:1px solid var(--border-default);background:var(--canvas-default);font-size:15px;font-weight:500;cursor:pointer;user-select:none;transition:background .12s,border-color .12s,color .12s;-webkit-tap-highlight-color:transparent}\n.pill .fine{font-size:11px;font-weight:600}\n.pill.present{background:var(--success-subtle);border-color:var(--success-emphasis);color:var(--success-fg)}\n.pill.absent{background:var(--danger-subtle);border-color:var(--danger-emphasis);color:var(--danger-fg)}\n.pill.auto{border-style:dashed}\n.panel-fine{font-size:13px;font-weight:600;color:var(--danger-fg);margin-bottom:14px}\n.member-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}\n.member-row input{flex:1 1 100%;min-width:0;font:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--border-default);border-radius:8px;background:var(--canvas-subtle);color:var(--fg-default)}\n.member-row input:focus{outline:2px solid var(--accent-fg);outline-offset:-1px}\n.reasons{margin-top:10px;padding:14px 16px;background:var(--canvas-default);border:1px solid var(--border-default);border-radius:8px}\n.reasons-title{font-size:13px;font-weight:600;color:var(--fg-muted);margin-bottom:10px}\n.reason-member{margin-bottom:10px}\n.reason-member:last-child{margin-bottom:0}\n.reason-name{font-size:13px;font-weight:700}\n.reason-list{font-size:13px;color:var(--fg-default);margin:4px 0 0;padding-left:18px}\n.reason-empty{font-size:13px;color:var(--fg-subtle);margin-top:2px}\n.authbar{display:flex;align-items:center;gap:12px;margin-top:16px;padding:12px 16px;background:var(--canvas-default);border:1px solid var(--border-default);border-radius:6px;font-size:13px}\n.authbar .who{display:flex;align-items:center;gap:8px;color:var(--fg-default)}\n.authbar .who b{font-weight:700}\n.authbar .email{color:var(--fg-muted);font-size:12px}\n.authbar .logout{margin-left:auto;background:none;border:1px solid var(--border-default);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--fg-muted);cursor:pointer}\n.authbar .logout:hover{border-color:var(--danger-emphasis);color:var(--danger-fg)}\n.authbar .denied{color:var(--danger-fg)}\n.login-notice{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;background:#fff8c5;border:1px solid #d4a72c;border-radius:6px;font-size:13px;color:#4d2d00}\n.setup-notice{margin-top:16px;padding:12px 16px;background:#fff8c5;border:1px solid #d4a72c;border-radius:6px;font-size:13px;color:#4d2d00;line-height:1.6}\n.pill.locked{cursor:not-allowed;opacity:.55}\n.pill.locked:hover{border-color:var(--border-default)}\n.member-row input:disabled{opacity:.6;cursor:not-allowed}\n@media (max-width:480px){.cell{font-size:11px}.month-title{font-size:15px}}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n<header>\n<h1>Claude Code 스터디 출석부<\u002Fh1>\n<p class=\"sub\">2026년 7월 ~ 12월 · 매주 화·금 · 마정우 · 민재홍 · 방정혁<\u002Fp>\n<div id=\"authbar\"><\u002Fdiv>\n<div class=\"legend\">\n<div class=\"legend-item\"><span class=\"dot none\"><\u002Fspan>미정<\u002Fdiv>\n<div class=\"legend-item\"><span class=\"dot present\"><\u002Fspan>참석<\u002Fdiv>\n<div class=\"legend-item\"><span class=\"dot absent\"><\u002Fspan>결석 (벌금 5,000원)<\u002Fdiv>\n<div class=\"legend-item\"><span class=\"dot auto\"><\u002Fspan>지난 날짜 미체크 → 자동 결석<\u002Fdiv>\n<\u002Fdiv>\n<p class=\"cap\">토요일은 파란색, 일요일·공휴일은 빨간색 숫자로 표시돼요.<\u002Fp>\n<\u002Fheader>\n<div id=\"months\"><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"panel-backdrop\" id=\"backdrop\"><\u002Fdiv>\n<div class=\"panel\" id=\"panel\"><div class=\"panel-inner\" id=\"panelInner\"><\u002Fdiv><\u002Fdiv>\n<script>\nconst MEMBERS=['마정우','민재홍','방정혁'];\nconst INITIALS={'마정우':'마','민재홍':'민','방정혁':'방'};\nconst EMAIL_MAP={'akdmlghks1@gmail.com':'마정우','mjh2429558@gmail.com':'민재홍','wjdgur1gh@gmail.com':'방정혁'};\nconst GOOGLE_CLIENT_ID='836538061808-2qvud1cep5b9k6hopp9rccl58m6iiulg.apps.googleusercontent.com';\nconst USER_KEY='ccstudy-user-v1';\nlet currentUser=JSON.parse(localStorage.getItem(USER_KEY)||'null');\nlet googleReady=false;\nfunction isInAppBrowser(){return /KAKAOTALK|Instagram|FBAN|FBAV|FB_IAB|Line\\/|NAVER|DaumApps|KAKAOSTORY|; wv\\)/i.test(navigator.userAgent||'')}\nconst INAPP=isInAppBrowser();\nfunction openExternal(){var url=location.href;var ua=(navigator.userAgent||'').toLowerCase();if(ua.indexOf('android')>-1){location.href='intent://'+url.replace(/^https?:\\/\\//,'')+'#Intent;scheme=https;package=com.android.chrome;end';}else{location.href='kakaotalk://web/openExternal?url='+encodeURIComponent(url);}}\nfunction showInAppBanner(){var bar=document.getElementById('authbar');if(!bar)return;bar.className='authbar';bar.innerHTML='<div class=\"setup-notice\" style=\"width:100%\">카카오톡 같은 인앱 브라우저에서는 구글 로그인이 막혀 있어요. 아래 버튼으로 크롬/사파리에서 열면 로그인할 수 있어요.<br><button onclick=\"openExternal()\" style=\"margin-top:8px;padding:10px 16px;border:none;border-radius:8px;background:#0969da;cursor:pointer;color:#fff;font-weight:700;font-size:14px\">크롬/사파리로 열기<\u002Fbutton><\u002Fdiv>';}\nfunction currentName(){return currentUser?EMAIL_MAP[currentUser.email]||null:null}\nfunction isSelf(name){return currentName()===name}\nfunction parseJwt(token){const b64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');const json=decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));return JSON.parse(json)}\nfunction handleCredentialResponse(resp){const payload=parseJwt(resp.credential);currentUser={email:payload.email,displayName:payload.name};localStorage.setItem(USER_KEY,JSON.stringify(currentUser));renderAuthUI();renderCalendar();if(selected)renderPanel();}\nfunction logout(){currentUser=null;localStorage.removeItem(USER_KEY);if(window.google&&google.accounts&&google.accounts.id)google.accounts.id.disableAutoSelect();renderAuthUI();renderCalendar();if(selected)renderPanel();}\nfunction initGoogle(){\n  const bar=document.getElementById('authbar');\n  if(INAPP){showInAppBanner();return;}\n  if(GOOGLE_CLIENT_ID.indexOf('YOUR_')===0){\n    bar.innerHTML='<div class=\"setup-notice\">Google 로그인이 아직 설정되지 않았어요. Google Cloud Console에서 OAuth 클라이언트 ID를 만든 뒤 코드의 GOOGLE_CLIENT_ID 값을 채워 넣어주세요. 그 전까지는 로그인 없이 자유롭게 체크할 수 있어요.<\u002Fdiv>';\n    return;\n  }\n  if(!window.google||!google.accounts||!google.accounts.id)return;\n  try{\n    google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredentialResponse});\n    googleReady=true;\n    renderAuthUI();\n  }catch(err){\n    console.error('Google 로그인 초기화 실패',err);\n    bar.innerHTML='<div class=\"setup-notice\">로그인 초기화 오류: '+(err&&err.message?err.message:'알 수 없는 오류')+'<br>Google Cloud Console의 \"승인된 자바스크립트 원본\"에 이 사이트 주소가 정확히 등록되었는지, 반영까지 몇 분 기다렸는지 확인하고 <button onclick=\"initGoogle()\" style=\"margin-left:6px;padding:4px 10px;border:1px solid #4d2d00;border-radius:6px;background:none;cursor:pointer;color:#4d2d00\">다시 시도<\u002Fbutton><\u002Fdiv>';\n  }\n}\nlet __gsiPollTries=0;\nconst __gsiPoll=setInterval(()=>{\n  if(INAPP){showInAppBanner();clearInterval(__gsiPoll);return;}\n  __gsiPollTries++;\n  if(googleReady){clearInterval(__gsiPoll);return;}\n  if(__gsiPollTries>24){\n    clearInterval(__gsiPoll);\n    const bar=document.getElementById('authbar');\n    if(bar&&!googleReady)bar.innerHTML='<div class=\"setup-notice\">Google 로그인을 불러오지 못했어요. 이 브라우저가 accounts.google.com 접속을 차단했을 수 있어요. <b>크롬(Chrome)<\u002Fb>으로 열거나, 광고/추적 차단을 끔 뒤 <button onclick=\"__gsiPollTries=0;initGoogle()\" style=\"margin-left:6px;padding:4px 10px;border:1px solid #4d2d00;border-radius:6px;background:none;cursor:pointer;color:#4d2d00\">다시 시도<\u002Fbutton><\u002Fdiv>';\n    return;\n  }\n  if(window.google&&google.accounts&&google.accounts.id)initGoogle();\n},500);\nfunction renderAuthUI(){\n  const bar=document.getElementById('authbar');\n  if(GOOGLE_CLIENT_ID.indexOf('YOUR_')===0)return;\n  bar.innerHTML='';\n  if(currentUser){\n    const name=currentName();\n    const who=document.createElement('div');\n    who.className='who';\n    who.innerHTML=name?('<b>'+name+'<\u002Fb>'):'<span class=\"denied\">등록되지 않은 계정<\u002Fspan>';\n    const email=document.createElement('span');\n    email.className='email';\n    email.textContent=currentUser.email;\n    who.appendChild(email);\n    const logoutBtn=document.createElement('button');\n    logoutBtn.className='logout';\n    logoutBtn.textContent='로그아웃';\n    logoutBtn.onclick=logout;\n    bar.className='authbar';\n    bar.appendChild(who);\n    bar.appendChild(logoutBtn);\n  }else if(!googleReady){\n    bar.className='authbar';\n    bar.innerHTML='<div class=\"setup-notice\">로그인 준비 중…<\u002Fdiv>';\n  }else{\n    bar.className='authbar';\n    const btnHost=document.createElement('div');\n    bar.appendChild(btnHost);\n    google.accounts.id.renderButton(btnHost,{theme:'outline',size:'medium',text:'signin_with'});\n  }\n}\nconst FINE=5000;\nconst STORAGE_KEY='ccstudy-attendance-v1';\nconst MONTHS=[[2026,6],[2026,7],[2026,8],[2026,9],[2026,10],[2026,11]];\nconst STUDY_START=new Date(2026,7,1);\nconst HOLIDAYS={'2026-07-17':'제헌절','2026-08-15':'광복절','2026-08-17':'대체공휴일','2026-09-24':'추석 연휴','2026-09-25':'추석','2026-09-26':'추석 연휴','2026-10-03':'개천절','2026-10-05':'대체공휴일','2026-10-09':'한글날','2026-12-25':'성탄절'};\nlet state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');\nlet selected=null;\nfunction save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}\nfunction isoDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}\nfunction isStudyDay(d){const dow=d.getDay();return dow===2||dow===5}\nfunction cycle(status){if(status==='present')return'absent';if(status==='absent')return undefined;return'present'}\nconst today=new Date();today.setHours(0,0,0,0);\nfunction getStored(iso,name){const raw=(state[iso]||{})[name];if(!raw)return null;return typeof raw==='string'?{status:raw,reason:''}:raw}\nfunction setStored(iso,name,data){state[iso]=state[iso]||{};if(!data)delete state[iso][name];else state[iso][name]=data;if(Object.keys(state[iso]).length===0)delete state[iso];save()}\nfunction memberData(iso,name,isPast){const stored=getStored(iso,name);const auto=!stored&&isPast;return{status:stored?stored.status:(auto?'absent':undefined),reason:stored?stored.reason||'':'',auto,stored}}\nfunction renderCalendar(){\n  const monthsEl=document.getElementById('months');\n  monthsEl.innerHTML='';\n  const weekdayNames=['일','월','화','수','목','금','토'];\n  MONTHS.forEach(([y,m])=>{\n    const monthDiv=document.createElement('div');\n    monthDiv.className='month';\n    const title=document.createElement('div');\n    title.className='month-title';\n    title.textContent=y+'년 '+(m+1)+'월';\n    monthDiv.appendChild(title);\n    const grid=document.createElement('div');\n    grid.className='grid';\n    weekdayNames.forEach(w=>{const wd=document.createElement('div');wd.className='wd';wd.textContent=w;grid.appendChild(wd)});\n    const first=new Date(y,m,1);\n    const lastDate=new Date(y,m+1,0).getDate();\n    for(let i=0;i<first.getDay();i++){const e=document.createElement('div');e.className='cell empty';grid.appendChild(e)}\n    for(let day=1;day<=lastDate;day++){\n      const d=new Date(y,m,day);\n      const iso=isoDate(d);\n      const isPast=d<today;\n      const countable=isPast&&d>=STUDY_START;\n      const dow=d.getDay();\n      const holiday=HOLIDAYS[iso];\n      const numCls='daynum'+((holiday||dow===0)?' sun':(dow===6?' sat':''));\n      const numHtml='<span class=\"'+numCls+'\">'+day+'<\u002Fspan>'+(holiday?'<span class=\"holi-name\">'+holiday+'<\u002Fspan>':'');\n      if(!isStudyDay(d)){\n        const cell=document.createElement('div');\n        cell.className='cell plain';\n        cell.innerHTML=numHtml;\n        grid.appendChild(cell);\n        continue;\n      }\n      const cell=document.createElement('div');\n      let fined=false;\n      const badgesRow=document.createElement('div');\n      badgesRow.className='cell-badges';\n      MEMBERS.forEach(name=>{\n        const {status,auto}=memberData(iso,name,countable);\n        if(status==='absent')fined=true;\n        const badge=document.createElement('span');\n        badge.className='badge '+(status||'none')+(auto?' auto':'');\n        badge.textContent=INITIALS[name];\n        badge.title=name;\n        badgesRow.appendChild(badge);\n      });\n      cell.className='cell study'+(fined?' fined':'')+(selected===iso?' selected':'');\n      cell.innerHTML=numHtml;\n      cell.appendChild(badgesRow);\n      cell.onclick=()=>{selected=iso;renderCalendar();renderPanel();};\n      grid.appendChild(cell);\n    }\n    monthDiv.appendChild(grid);\n    const reasons=document.createElement('div');\n    reasons.className='reasons';\n    const reasonsTitle=document.createElement('div');\n    reasonsTitle.className='reasons-title';\n    reasonsTitle.textContent=(m+1)+'월 결석 사유';\n    reasons.appendChild(reasonsTitle);\n    const byMember={};\n    MEMBERS.forEach(name=>byMember[name]=[]);\n    for(let day=1;day<=lastDate;day++){\n      const d=new Date(y,m,day);\n      if(!isStudyDay(d))continue;\n      const iso=isoDate(d);\n      const countable=(d<today)&&d>=STUDY_START;\n      MEMBERS.forEach(name=>{\n        const {status,reason,auto}=memberData(iso,name,countable);\n        if(status==='absent')byMember[name].push({day,reason,auto});\n      });\n    }\n    MEMBERS.forEach(name=>{\n      const memberDiv=document.createElement('div');\n      memberDiv.className='reason-member';\n      const nameEl=document.createElement('span');\n      nameEl.className='reason-name';\n      nameEl.textContent=name;\n      memberDiv.appendChild(nameEl);\n      const entries=byMember[name];\n      if(entries.length===0){\n        const empty=document.createElement('div');\n        empty.className='reason-empty';\n        empty.textContent='이번 달 결석 없음';\n        memberDiv.appendChild(empty);\n      }else{\n        const list=document.createElement('ul');\n        list.className='reason-list';\n        entries.forEach(({day,reason,auto})=>{\n          const li=document.createElement('li');\n          li.textContent=(m+1)+'/'+day+' — '+(reason?reason:(auto?'미입력 (자동 결석)':'사유 미입력'));\n          list.appendChild(li);\n        });\n        memberDiv.appendChild(list);\n      }\n      reasons.appendChild(memberDiv);\n    });\n    monthDiv.appendChild(reasons);\n    monthsEl.appendChild(monthDiv);\n  });\n}\nfunction closePanel(){selected=null;document.getElementById('panel').classList.remove('show');document.getElementById('backdrop').classList.remove('show');renderCalendar();}\nfunction renderPanel(){\n  const panel=document.getElementById('panel');\n  const backdrop=document.getElementById('backdrop');\n  const inner=document.getElementById('panelInner');\n  if(!selected){panel.classList.remove('show');backdrop.classList.remove('show');return;}\n  const [y,m,dnum]=selected.split('-').map(Number);\n  const d=new Date(y,m-1,dnum);\n  const isPast=d<today;\n  const countable=isPast&&d>=STUDY_START;\n  const weekdayNames=['일','월','화','수','목','금','토'];\n  inner.innerHTML='';\n  const grab=document.createElement('div');\n  grab.className='panel-grab';\n  inner.appendChild(grab);\n  const head=document.createElement('div');\n  head.className='panel-head';\n  const t=document.createElement('div');\n  t.className='panel-title';\n  t.textContent=m+'월 '+dnum+'일 ('+weekdayNames[d.getDay()]+') 출석';\n  const close=document.createElement('button');\n  close.className='panel-close';\n  close.textContent='×';\n  close.onclick=closePanel;\n  head.appendChild(t);head.appendChild(close);\n  inner.appendChild(head);\n  if(isPast){\n    const notice=document.createElement('div');\n    notice.className='login-notice';\n    notice.textContent='지난 날짜는 체크하거나 수정할 수 없어요.';\n    inner.appendChild(notice);\n  }else if(!currentUser&&GOOGLE_CLIENT_ID.indexOf('YOUR_')!==0){\n    const notice=document.createElement('div');\n    notice.className='login-notice';\n    notice.textContent='로그인 후 본인 출석만 체크할 수 있어요. 위 구글 로그인 버튼으로 로그인해주세요.';\n    inner.appendChild(notice);\n  }else if(currentUser&&!currentName()){\n    const notice=document.createElement('div');\n    notice.className='login-notice';\n    notice.textContent='등록된 멤버가 아닌 계정이라 출석을 체크할 수 없어요.';\n    inner.appendChild(notice);\n  }\n  let absentCount=0;\n  MEMBERS.forEach(name=>{\n    const {status,auto,reason,stored}=memberData(selected,name,countable);\n    if(status==='absent')absentCount++;\n    const row=document.createElement('div');\n    row.className='member-row';\n    const pill=document.createElement('div');\n    const editable=!isPast&&(GOOGLE_CLIENT_ID.indexOf('YOUR_')===0||isSelf(name));\n    pill.className='pill'+(status?' '+status:'')+(auto?' auto':'')+(editable?'':' locked');\n    pill.title=editable?'':(isPast?'지난 날짜는 체크할 수 없어요':'본인만 체크할 수 있어요');\n    pill.innerHTML=name+(status==='absent'?' <span class=\"fine\">-'+FINE.toLocaleString()+'원'+(auto?' 자동':'')+'<\u002Fspan>':'');\n    pill.onclick=()=>{\n      if(!editable)return;\n      const next=cycle(status);\n      setStored(selected,name,next?{status:next,reason:next==='absent'?(stored&&stored.reason)||'':''}:null);\n      renderPanel();renderCalendar();\n    };\n    row.appendChild(pill);\n    if(status==='absent'){\n      const reasonInput=document.createElement('input');\n      reasonInput.type='text';\n      reasonInput.placeholder=name+' 결석 사유';\n      reasonInput.value=reason;\n      reasonInput.disabled=!editable;\n      reasonInput.oninput=(e)=>{setStored(selected,name,{status:'absent',reason:e.target.value})};\n      row.appendChild(reasonInput);\n    }\n    inner.appendChild(row);\n  });\n  if(absentCount>0){\n    const fine=document.createElement('div');\n    fine.className='panel-fine';\n    fine.textContent='이 날 벌금 합계 '+(FINE*absentCount).toLocaleString()+'원';\n    inner.appendChild(fine);\n  }\n  panel.classList.add('show');\n  backdrop.classList.add('show');\n}\ndocument.getElementById('backdrop').onclick=closePanel;\nif(INAPP)showInAppBanner();else renderAuthUI();\nrenderCalendar();\nif(!INAPP&&window.__gsiLoaded)initGoogle();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
